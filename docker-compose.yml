version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: straycat-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - straycat-network
    restart: unless-stopped

  # StrayCat API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: straycat-api
    ports:
      - "5000:80"
      - "5001:443"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - postgres
    networks:
      - straycat-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  straycat-network:
    driver: bridge
